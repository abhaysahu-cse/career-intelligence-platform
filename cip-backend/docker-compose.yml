version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Career Intelligence Platform — Full Docker Compose
# Services: 8 microservices + API Gateway + PostgreSQL + Redis + Kafka + Zookeeper
# ─────────────────────────────────────────────────────────────────────────────

networks:
  cip-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  uploads-data:

x-common-env: &common-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: cip
  DB_PASSWORD: cip123
  REDIS_HOST: redis
  REDIS_PORT: 6379
  KAFKA_BROKERS: kafka:9092
  JWT_SECRET: cip-super-secret-key-that-is-at-least-256-bits-long-for-hs256

x-service-defaults: &service-defaults
  networks:
    - cip-network
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_started

services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: cip-postgres
    environment:
      POSTGRES_USER: cip
      POSTGRES_PASSWORD: cip123
      POSTGRES_MULTIPLE_DATABASES: cip_auth,cip_students,cip_resumes,cip_scores,cip_interviews,cip_jobs,cip_analytics,cip_recommendations
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - cip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cip-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - cip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: cip-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - cip-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: cip-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - cip-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cip-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cip-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - cip-network

  # ─── API Gateway ─────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: cip-api-gateway
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
    networks:
      - cip-network
    depends_on:
      - redis
      - kafka
    restart: unless-stopped

  # ─── Microservices ───────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: cip-auth-service
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
    <<: *service-defaults

  student-service:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: cip-student-service
    ports:
      - "8082:8082"
    environment:
      <<: *common-env
    <<: *service-defaults

  resume-service:
    build:
      context: ./resume-service
      dockerfile: Dockerfile
    container_name: cip-resume-service
    ports:
      - "8083:8083"
    environment:
      <<: *common-env
      STORAGE_TYPE: local
      LOCAL_STORAGE_PATH: /uploads
    volumes:
      - uploads-data:/uploads
    <<: *service-defaults

  score-service:
    build:
      context: ./score-service
      dockerfile: Dockerfile
    container_name: cip-score-service
    ports:
      - "8084:8084"
    environment:
      <<: *common-env
    <<: *service-defaults

  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: cip-analytics-service
    ports:
      - "8085:8085"
    environment:
      <<: *common-env
      SCORE_SERVICE_URL: http://score-service:8084
      STUDENT_SERVICE_URL: http://student-service:8082
    <<: *service-defaults

  interview-service:
    build:
      context: ./interview-service
      dockerfile: Dockerfile
    container_name: cip-interview-service
    ports:
      - "8086:8086"
    environment:
      <<: *common-env
    <<: *service-defaults

  job-service:
    build:
      context: ./job-service
      dockerfile: Dockerfile
    container_name: cip-job-service
    ports:
      - "8087:8087"
    environment:
      <<: *common-env
    <<: *service-defaults

  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: cip-recommendation-service
    ports:
      - "8088:8088"
    environment:
      <<: *common-env
    <<: *service-defaults
