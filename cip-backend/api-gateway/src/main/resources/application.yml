server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:3000"
            allowCredentials: true
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - X-RateLimit-Limit
              - X-RateLimit-Remaining

      routes:
        # AUTH SERVICE
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - JwtAuthFilter

        # STUDENT SERVICE
        - id: student-service
          uri: http://localhost:8082
          predicates:
            - Path=/student/**
          filters:
            - JwtAuthFilter

        # RESUME SERVICE
        - id: resume-service
          uri: http://localhost:8083
          predicates:
            - Path=/resume/**
          filters:
            - JwtAuthFilter

        # SCORE SERVICE
        - id: score-service
          uri: http://localhost:8084
          predicates:
            - Path=/score/**
          filters:
            - JwtAuthFilter

        # ANALYTICS SERVICE
        - id: analytics-service
          uri: http://localhost:8085
          predicates:
            - Path=/analytics/**
          filters:
            - JwtAuthFilter

        # INTERVIEW SERVICE
        - id: interview-service
          uri: http://localhost:8086
          predicates:
            - Path=/interview/**
          filters:
            - JwtAuthFilter

        # JOB SERVICE
        - id: job-service
          uri: http://localhost:8087
          predicates:
            - Path=/jobs/**
          filters:
            - JwtAuthFilter

        # RECOMMENDATION SERVICE
        - id: recommendation-service
          uri: http://localhost:8088
          predicates:
            - Path=/roadmap/**,/recommendations/**
          filters:
            - JwtAuthFilter

        # CERTIFICATE SERVICE
        - id: certificate-service
          uri: http://localhost:8089
          predicates:
            - Path=/certificates/**
          filters:
            - JwtAuthFilter

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:cip-redis-pass}

jwt:
  secret: ${JWT_SECRET:cip-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.cip: DEBUG
